<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Contact Page</title>
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>
<section class="contact-section">
    <div class="container">
        <div class="header">
            <h1>Contact Us</h1>
            <p>Have questions? We’re here to help. Reach out to us using the form below or explore other ways to connect with us.</p>
        </div>

        <div class="contact-form">
            <form>
                <div class="input-group">
                    <input type="text" id="name" name="name" required>
                    <label for="name">Your Name</label>
                </div>
                <div class="input-group">
                    <input type="email" id="email" name="email" required>
                    <label for="email">Your Email</label>
                </div>
                <div class="input-group">
                    <textarea id="message" name="message" rows="5" required></textarea>
                    <label for="message">Your Message</label>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>

        <div class="contact-info">
            <div class="info-item">
                <h3>Email</h3>
                <p>contact@futuristic.com</p>
            </div>
            <div class="info-item">
                <h3>Phone</h3>
                <p>+1 234 567 890</p>
            </div>
            <div class="info-item">
                <h3>Address</h3>
                <p>123 Future Blvd, Metropolis</p>
            </div>
        </div>
    </div>

    <!-- Floating Background Animations -->
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
</section>

<script src="scripts.js"></script>
</body>
</html>
